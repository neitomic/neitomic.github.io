title: neitomic
email: neitomic@gmail.com
description: >-
  I'm trying to learn to write, also build an harbit to write.
baseurl: ""
url: "https://neitomic.xyz"
twitter_username: neitomic
github_username: neitomic

# Build settings
theme: jekyll-bear-theme
plugins:
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-redirect-from

markdown: kramdown

compress_html:
  clippings: all
  comments: [""]
  endings:
    [
      html,
      head,
      body,
      li,
      dt,
      dd,
      rt,
      rp,
      optgroup,
      option,
      colgroup,
      caption,
      thead,
      tbody,
      tfoot,
      tr,
      td,
      th,
    ]
  profile: false
  blanklines: false
  ignore:
    envs: []

# sass:
#   sass_dir: css
#   style:    compressed

collections:
  my_tags:
    output: true
    permalink: /tagged/:slug/
defaults:
  - scope:
      path: ""
      type: my_tags
    values:
      layout: tagged

# baseurl: ""
permalink: /blog/:slug
timezone: Asia/Ho_Chi_Minh
future: false

exclude:
  - README.md
  - LICENSE.md
  - vendor

Blog: /blog

# Add general links to site pages here
links:
  # Resume: /assets/resume.pdf

# Add links for more focus here
special_links:
  # "Search": https://duckduckgo.com
